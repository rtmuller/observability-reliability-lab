global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules
rule_files:
  - /etc/prometheus/alerts/watchdog.yml
  - /etc/prometheus/alerts/absent.yml

# Send alerts to AlertManager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # -------------------------------------------------------
  # Prometheus self-monitoring
  # -------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # -------------------------------------------------------
  # AlertManager health
  # -------------------------------------------------------
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # -------------------------------------------------------
  # Sample application (payment service)
  # -------------------------------------------------------
  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:8000"]

  # -------------------------------------------------------
  # Blackbox Exporter self-metrics
  # -------------------------------------------------------
  - job_name: "blackbox-exporter"
    static_configs:
      - targets: ["blackbox-exporter:9115"]

  # -------------------------------------------------------
  # Meta-monitoring: probe health endpoints of monitoring stack
  # Uses blackbox-exporter to check HTTP 200 on /healthy endpoints
  # -------------------------------------------------------
  - job_name: "monitoring-health"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://prometheus:9090/-/healthy
          - http://alertmanager:9093/-/healthy
          - http://grafana:3000/api/health
          - http://payment-service:8000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
