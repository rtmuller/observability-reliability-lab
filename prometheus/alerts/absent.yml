groups:
  # =============================================================
  # Absent data alerts (from Article 2)
  # Detect when critical metrics stop being reported entirely
  # =============================================================
  - name: absent-data
    rules:
      # -----------------------------------------------------------
      # Payment service scrape target disappeared
      # -----------------------------------------------------------
      - alert: PaymentServiceAbsent
        expr: absent(up{job="payment-service"})
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Payment service metrics are completely absent"
          description: >
            Prometheus is not receiving any metrics from the payment
            service. The service may be down, or the scrape target
            may have been removed.

      # -----------------------------------------------------------
      # Transaction metrics stopped reporting
      # -----------------------------------------------------------
      - alert: TransactionMetricsAbsent
        expr: absent(transactions_total{service="checkout"})
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Transaction metrics have disappeared"
          description: >
            The transactions_total metric for the checkout service
            has not been reported for 5 minutes. The service may be
            running but its instrumentation could be broken.

      # -----------------------------------------------------------
      # Prometheus self-monitoring absent
      # -----------------------------------------------------------
      - alert: PrometheusSelfMonitorAbsent
        expr: absent(up{job="prometheus"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus cannot scrape itself"
          description: >
            Prometheus self-scraping has stopped. This usually means
            Prometheus is in a degraded state or restarting.
