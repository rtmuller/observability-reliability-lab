groups:
  # =============================================================
  # Meta-monitoring alerts
  # These alerts monitor the health of the monitoring stack itself
  # =============================================================
  - name: meta-monitoring
    rules:
      # -----------------------------------------------------------
      # Watchdog (DeadMansSwitch)
      # This alert is ALWAYS firing. If it stops, the pipeline is broken.
      # Route this to an external heartbeat service (Healthchecks.io,
      # PagerDuty, Deadman's Snitch) via a separate receiver.
      # -----------------------------------------------------------
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "Watchdog alert — monitoring pipeline is alive"
          description: >
            This alert is always firing. If you stop receiving it,
            it means Prometheus or AlertManager is down. Route this
            to an external heartbeat service for independent detection.

      # -----------------------------------------------------------
      # Monitoring component unhealthy (blackbox probe failed)
      # -----------------------------------------------------------
      - alert: MonitoringComponentDown
        expr: probe_success{job="monitoring-health"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Monitoring component {{ $labels.instance }} is unhealthy"
          description: >
            The blackbox probe for {{ $labels.instance }} has been
            failing for more than 1 minute. This may indicate a
            monitoring pipeline failure.

      # -----------------------------------------------------------
      # Prometheus scrape target down
      # -----------------------------------------------------------
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Scrape target {{ $labels.job }} is down"
          description: >
            Prometheus cannot reach {{ $labels.instance }} (job={{ $labels.job }}).
            This target has been unreachable for more than 2 minutes.

      # -----------------------------------------------------------
      # Prometheus configuration reload failed
      # -----------------------------------------------------------
      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus config reload has failed"
          description: >
            The last Prometheus configuration reload attempt failed.
            Check for syntax errors in the config or alert rule files.

      # -----------------------------------------------------------
      # Prometheus TSDB compaction failures
      # -----------------------------------------------------------
      - alert: PrometheusTSDBCompactionsFailing
        expr: increase(prometheus_tsdb_compactions_failed_total[1h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Prometheus TSDB compactions are failing"
          description: >
            Prometheus has had TSDB compaction failures in the last hour.
            This may indicate disk issues or data corruption.

      # -----------------------------------------------------------
      # AlertManager notification failures
      # -----------------------------------------------------------
      - alert: AlertManagerNotificationsFailing
        expr: rate(alertmanager_notifications_failed_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "AlertManager is failing to send notifications"
          description: >
            AlertManager has been unable to deliver notifications for
            the last 5 minutes. Alerts may be firing but nobody is
            being notified.
