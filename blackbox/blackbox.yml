modules:
  # ---------------------------------------------------------------
  # HTTP 2xx check — used to probe health endpoints
  # of monitoring stack components
  # ---------------------------------------------------------------
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  # ---------------------------------------------------------------
  # HTTP POST check — can be used for webhook verification
  # ---------------------------------------------------------------
  http_post_2xx:
    prober: http
    timeout: 5s
    http:
      method: POST
      valid_status_codes: [200, 204]
